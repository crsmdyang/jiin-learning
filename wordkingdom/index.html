<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦄</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>단어 왕국 👑🦄</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; user-select:none; -webkit-user-select:none; }
html,body { height:100%; overflow:hidden; font-family:'Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif; }
body { background:linear-gradient(160deg,#ffd6ec 0%,#e7d4ff 40%,#cfe4ff 80%,#ffeef8 100%); background-size:200% 200%; animation:bgshift 18s ease infinite; }
@keyframes bgshift { 0%{background-position:0% 0%} 50%{background-position:100% 100%} 100%{background-position:0% 0%} }

#bgDeco { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.floaty { position:absolute; animation:floatUp linear infinite; opacity:.5; }
@keyframes floatUp { from { transform:translateY(105vh) rotate(0deg);} to { transform:translateY(-10vh) rotate(360deg);} }

#app { position:relative; z-index:2; height:100%; display:flex; flex-direction:column; }
.screen { display:none; flex:1; flex-direction:column; padding:2vmin; height:100%; }
.screen.active { display:flex; }
.hidden { display:none !important; }

/* ---------- HOME ---------- */
#scr-home { gap:1.8vmin; overflow-y:auto; }
.home-top { display:flex; align-items:center; gap:1.6vmin; }
.chip { background:rgba(255,255,255,.85); border:none; font-family:inherit; cursor:pointer;
  border-radius:99px; padding:1vmin 2.6vmin; font-size:3vmin; color:#8b3fa8; box-shadow:0 3px 8px rgba(160,48,143,.16); }
.home-title { font-size:5.6vmin; color:#a0308f; text-shadow:0 2px 0 #fff, 0 5px 14px rgba(255,105,180,.35); text-align:center; }
.home-hero { display:flex; align-items:center; justify-content:center; gap:4vmin; flex-wrap:wrap; }
.home-uni { font-size:15vmin; animation:bob 2.4s ease-in-out infinite; filter:drop-shadow(0 6px 10px rgba(160,48,143,.3)); cursor:pointer; }
@keyframes bob { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-2.5vmin) rotate(4deg)} }
.hero-right { display:flex; flex-direction:column; align-items:center; gap:1.6vmin; }
.stat-row { display:flex; gap:2vmin; align-items:center; flex-wrap:wrap; justify-content:center; }
.stat-pill { background:rgba(255,255,255,.85); border-radius:99px; padding:1.2vmin 2.8vmin; font-size:3.2vmin; color:#8b3fa8; box-shadow:0 3px 10px rgba(160,48,143,.18); }
.big-btn { border:none; cursor:pointer; font-family:inherit; color:#fff;
  background:linear-gradient(135deg,#ff6fb7,#b06ef5); border-radius:99px; padding:2.2vmin 8vmin; font-size:5vmin;
  box-shadow:0 6px 0 #c34e9b, 0 12px 22px rgba(200,80,160,.4); transition:transform .12s; }
.big-btn:active { transform:translateY(5px); box-shadow:0 1px 0 #c34e9b; }
.sub-btn { border:none; cursor:pointer; font-family:inherit; color:#8b3fa8;
  background:rgba(255,255,255,.88); border-radius:99px; padding:1.5vmin 3.6vmin; font-size:3.2vmin; box-shadow:0 3px 8px rgba(160,48,143,.2); }
.mini-row { display:flex; gap:2vmin; justify-content:center; flex-wrap:wrap; }
.mini-card { background:rgba(255,255,255,.92); border:none; cursor:pointer; font-family:inherit;
  border-radius:3vmin; padding:1.8vmin 2.6vmin; text-align:center; box-shadow:0 5px 14px rgba(160,48,143,.18);
  transition:transform .12s; min-width:20vmin; }
.mini-card:active { transform:scale(.94); }
.mini-card .mi { font-size:7vmin; }
.mini-card .mt { font-size:3vmin; color:#5a2d82; }
.mini-card .ms { font-size:2.3vmin; color:#b092c5; }
.quest-panel { background:rgba(255,255,255,.75); border-radius:3vmin; padding:2vmin 3vmin; box-shadow:0 4px 12px rgba(160,48,143,.14); max-width:100vmin; margin:0 auto; width:100%; }
.quest-panel h4 { font-size:3.2vmin; color:#8b3fa8; margin-bottom:1vmin; }
.q-item { display:flex; align-items:center; gap:1.6vmin; font-size:2.9vmin; color:#7a5b90; margin:.8vmin 0; }
.q-item .qbar { flex:1; height:2.2vmin; background:#f2e3f6; border-radius:99px; overflow:hidden; }
.q-item .qfill { height:100%; background:linear-gradient(90deg,#ffd94d,#ff8ad2); border-radius:99px; transition:width .5s; }
.q-item.done { color:#2e9159; }
.streak-dots { display:flex; gap:1.2vmin; justify-content:center; }
.sdot { width:3.4vmin; height:3.4vmin; border-radius:50%; background:#fff; box-shadow:inset 0 0 0 2px #e6b8e0; display:flex; align-items:center; justify-content:center; font-size:2.4vmin; }
.sdot.on { background:linear-gradient(135deg,#ffd94d,#ff9de2); }

/* ---------- GAME (모험/시험) ---------- */
#scr-game { gap:1.6vmin; }
.game-top { display:flex; align-items:center; gap:2vmin; }
.gt-quit { border:none; background:rgba(255,255,255,.8); border-radius:50%; width:6vmin; height:6vmin; font-size:3vmin; cursor:pointer; color:#b06; }
.progress-wrap { flex:1; height:3.4vmin; background:rgba(255,255,255,.7); border-radius:99px; overflow:hidden; box-shadow:inset 0 2px 5px rgba(160,48,143,.15); }
.progress-bar { height:100%; width:0%; background:linear-gradient(90deg,#ffd94d,#ff8ad2,#b48bff); border-radius:99px; transition:width .5s cubic-bezier(.6,-0.2,.3,1.4); }
.gt-stars { font-size:3.4vmin; color:#c77f00; background:rgba(255,255,255,.85); padding:.8vmin 2.4vmin; border-radius:99px; box-shadow:0 2px 7px rgba(200,140,0,.25); }
#combo-tag { position:absolute; left:50%; top:11vmin; transform:translateX(-50%) scale(0); font-size:4.5vmin; color:#ff5eae; text-shadow:0 2px 0 #fff; transition:transform .25s cubic-bezier(.5,-0.5,.3,1.8); z-index:6; pointer-events:none;}
#combo-tag.show { transform:translateX(-50%) scale(1); }
.q-card { background:rgba(255,255,255,.92); border-radius:4vmin; padding:2vmin 3vmin; text-align:center;
  box-shadow:0 6px 20px rgba(160,48,143,.18); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1vmin; min-height:22vmin; position:relative; }
.q-instr { font-size:2.9vmin; color:#b06ab0; }
.q-main { font-size:8vmin; color:#5a2d82; line-height:1.1; word-break:break-word; }
.q-main.emoji { font-size:14vmin; }
.q-sub { font-size:3.4vmin; color:#9b6bbf; }
.speaker { border:none; background:linear-gradient(135deg,#ffe08a,#ffb4e1); border-radius:50%; width:9vmin; height:9vmin; font-size:4.5vmin; cursor:pointer; box-shadow:0 4px 0 #e8a34d; }
.speaker:active { transform:translateY(3px); box-shadow:none; }
.speaker.big { width:16vmin; height:16vmin; font-size:8vmin; }
.opts { flex:1; display:grid; grid-template-columns:1fr 1fr; gap:2vmin; align-content:stretch; }
.opt { border:none; cursor:pointer; font-family:inherit; background:rgba(255,255,255,.95); border-radius:3.5vmin;
  font-size:5vmin; color:#5a2d82; box-shadow:0 5px 0 #e3c7ee, 0 8px 16px rgba(160,48,143,.12);
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.6vmin; padding:1.5vmin; transition:transform .1s; overflow:hidden; }
.opt:active { transform:translateY(4px); box-shadow:0 1px 0 #e3c7ee; }
.opt .big-e { font-size:11vmin; line-height:1.15; }
.opt .opt-kor { font-size:3.6vmin; color:#8b5fb0; }
.opt.correct { background:linear-gradient(135deg,#d7ffd9,#aef3c1); box-shadow:0 5px 0 #7fd898; animation:pulseWin .5s; }
.opt.wrongpick { background:#ffe3ea; animation:shake .45s; }
.opt.dim { opacity:.35; pointer-events:none; }
@keyframes pulseWin { 0%{transform:scale(1)} 40%{transform:scale(1.07)} 100%{transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-2vmin)} 75%{transform:translateX(2vmin)} }
.intro-card { flex:1; background:rgba(255,255,255,.94); border-radius:4vmin; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1.6vmin; padding:3vmin; box-shadow:0 6px 24px rgba(160,48,143,.2); }
.intro-emoji { font-size:20vmin; animation:bob 2s ease-in-out infinite; }
.intro-word { font-size:9vmin; color:#5a2d82; }
.intro-kor { font-size:5vmin; color:#a34fae; }
.intro-pos { font-size:2.8vmin; color:#b9a6cf; margin-top:-1vmin; }
.intro-ex { font-size:5vmin; font-weight:800; color:#d1487a; text-align:center; max-width:84vmin; line-height:1.4; }
.intro-deflabel { font-size:2.8vmin; font-weight:800; color:#3a9a6a; background:#eafaf1; padding:.8vmin 3vmin; border-radius:99vmin; }
.intro-def { font-size:4.4vmin; font-weight:800; color:#2e7d55; text-align:center; max-width:84vmin; line-height:1.45; }
.opt .opt-def { font-size:2.9vmin; color:#3a6b52; line-height:1.3; display:block; padding:.5vmin; }
/* 줄긋기 게임 */
.match-wrap { flex:1; display:flex; justify-content:space-between; position:relative; width:100%; max-width:110vmin; margin:0 auto; padding:1vmin 0; }
.match-col { display:flex; flex-direction:column; gap:1.6vmin; width:44%; justify-content:center; }
.mt-item { background:#f6eefc; border:.6vmin solid #d7b8ea; border-radius:2.4vmin; padding:1.6vmin 1.2vmin;
  font-size:3.4vmin; font-weight:800; color:#5b3a80; cursor:pointer; text-align:center; transition:.15s; font-family:inherit; }
.mt-item.mt-d { font-size:2.5vmin; font-weight:600; color:#3a6b52; background:#eafaf1; border-color:#a9dfc0; line-height:1.3; }
.mt-item.sel { border-color:#ff7ab0; background:#ffe0ea; transform:scale(1.05); }
.mt-item.matched { opacity:.45; cursor:default; border-color:#7be0a8; }
.mt-item.wrongpick { animation:shake .4s; background:#ffe3e3; border-color:#ff9a9a; }
svg.mt-lines { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; z-index:1; }
svg.mt-lines line { stroke:#ff7ab0; stroke-width:.8vmin; stroke-linecap:round; }
#spell-area { flex:1; display:flex; flex-direction:column; gap:2vmin; }
.slots { display:flex; gap:1.2vmin; justify-content:center; flex-wrap:wrap; min-height:9vmin; }
.slot { width:8.5vmin; height:9.5vmin; border-radius:2vmin; background:rgba(255,255,255,.75); box-shadow:inset 0 0 0 3px #eac6ef; font-size:5.5vmin; color:#5a2d82; display:flex; align-items:center; justify-content:center; }
.slot.fill { background:#fff; box-shadow:inset 0 0 0 3px #b981e8, 0 3px 8px rgba(160,48,143,.2); animation:pop .25s; }
@keyframes pop { 0%{transform:scale(.4)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
.tiles { display:flex; gap:1.6vmin; justify-content:center; flex-wrap:wrap; }
.tile { border:none; cursor:pointer; width:10.5vmin; height:11vmin; border-radius:2.5vmin; font-family:inherit;
  background:linear-gradient(135deg,#fff3ff,#ffe2f3); font-size:6vmin; color:#a0308f;
  box-shadow:0 4px 0 #e8b6dc; transition:transform .1s; }
.tile:active { transform:translateY(3px); }
.tile.used { opacity:0; pointer-events:none; }

/* ---------- RESULT ---------- */
#scr-result { align-items:center; justify-content:center; gap:2.4vmin; text-align:center; }
.res-uni { font-size:18vmin; animation:bob 2s ease-in-out infinite; }
.res-title { font-size:6.5vmin; color:#a0308f; text-shadow:0 2px 0 #fff; }
.res-stats { display:flex; gap:2.5vmin; }
.res-box { background:rgba(255,255,255,.9); border-radius:3vmin; padding:2vmin 4vmin; box-shadow:0 4px 14px rgba(160,48,143,.18); }
.res-num { font-size:6vmin; color:#8b3fa8; }
.res-lab { font-size:2.8vmin; color:#b07cc7; }
.res-unlock { font-size:3.8vmin; color:#d4488f; background:rgba(255,255,255,.85); border-radius:3vmin; padding:1.8vmin 4vmin; box-shadow:0 4px 12px rgba(212,72,143,.25); }

/* ---------- COLLECTION / STICKERS ---------- */
#scr-collection, #scr-stickers { gap:2vmin; }
.col-head { display:flex; align-items:center; gap:2vmin; }
.col-title { flex:1; font-size:5vmin; color:#8b3fa8; text-align:center; }
#castle-view { background:rgba(255,255,255,.6); border-radius:4vmin; padding:2vmin; text-align:center; box-shadow:0 4px 14px rgba(160,48,143,.15); }
.castle-scene { font-size:9vmin; line-height:1.25; letter-spacing:.5vmin; min-height:24vmin; display:flex; flex-direction:column; justify-content:flex-end; }
.castle-progress { font-size:3vmin; color:#a06cc0; margin-top:1vmin; }
.kg-sky { display:flex; gap:2.4vmin; justify-content:center; align-items:center; font-size:5.5vmin; min-height:7vmin; }
.kg-deco { cursor:pointer; transition:transform .15s; }
.kg-deco:active { transform:scale(1.2); }
.kg-deco.locked { filter:grayscale(1); opacity:.3; cursor:default; font-size:4vmin; }
.kg-castle { font-size:15vmin; line-height:1.15; animation:bob 3.2s ease-in-out infinite; }
.kg-castle-name { font-size:3.3vmin; color:#8b3fa8; }
.kg-garden-title { font-size:2.7vmin; color:#a06cc0; margin-top:1.6vmin; }
.kg-garden { display:flex; flex-wrap:wrap; gap:.8vmin 1.2vmin; justify-content:center; margin-top:.8vmin; }
.kg-plant { width:6.5vmin; text-align:center; cursor:pointer; transition:transform .15s; }
.kg-plant:active { transform:scale(1.25); }
.kg-plant .pe { font-size:4.6vmin; line-height:1.1; }
.kg-plant .pu { font-size:1.9vmin; color:#b092c5; }
.mini-card.locked { opacity:.55; filter:grayscale(.55); }
.mini-card.urgent { animation:urgentGlow 1.2s ease-in-out infinite; }
@keyframes urgentGlow { 0%,100%{ box-shadow:0 5px 14px rgba(160,48,143,.18);} 50%{ box-shadow:0 0 4vmin rgba(255,110,60,.75); transform:scale(1.04);} }
.uni-grid { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(20vmin,1fr)); gap:1.8vmin; padding-bottom:2vmin; }
.uni-card { background:rgba(255,255,255,.9); border-radius:3vmin; padding:1.6vmin; text-align:center; box-shadow:0 4px 10px rgba(160,48,143,.14); }
.uni-card .ue { font-size:9vmin; } .uni-card.locked .ue { filter:grayscale(1); opacity:.35; }
.uni-card .un { font-size:2.9vmin; color:#8b3fa8; }
.uni-card .uc { font-size:2.4vmin; color:#bb90cf; }
.stk-grid { flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(auto-fill,minmax(16vmin,1fr)); gap:1.6vmin; padding-bottom:2vmin; }
.stk { background:rgba(255,255,255,.9); border-radius:2.5vmin; padding:1.4vmin; text-align:center; box-shadow:0 3px 8px rgba(160,48,143,.13); position:relative; }
.stk .se { font-size:7vmin; } .stk.locked .se { filter:grayscale(1); opacity:.25; }
.stk .sn { font-size:2.2vmin; color:#8b3fa8; }
.stk .sc { position:absolute; top:.6vmin; right:1vmin; font-size:2.2vmin; color:#c77f00; }
.stk.rare { background:linear-gradient(135deg,#fff8e0,#ffeef8); }
.stk.epic { background:linear-gradient(135deg,#f3e8ff,#e0f0ff); box-shadow:0 3px 10px rgba(140,90,220,.3); }

/* ---------- MINIGAMES ---------- */
#scr-mini { gap:1.6vmin; }
#mini-area { flex:1; display:flex; flex-direction:column; gap:1.6vmin; position:relative; overflow:hidden; }
/* balloons */
.balloon { position:absolute; width:17vmin; text-align:center; cursor:pointer; transition:transform .1s; animation:sway 2.4s ease-in-out infinite; }
@keyframes sway { 0%,100%{margin-left:0} 50%{margin-left:2vmin} }
.balloon .bb { font-size:13vmin; line-height:1; filter:drop-shadow(0 4px 6px rgba(160,48,143,.25)); }
.balloon .bw { font-size:5.5vmin; line-height:1; margin-top:-9.5vmin; pointer-events:none; position:relative; }
.balloon.popped { animation:popB .35s forwards; }
@keyframes popB { to { transform:scale(2); opacity:0; } }
/* memory */
.mem-grid { flex:1; display:grid; gap:1.6vmin; align-content:center; justify-content:center; }
.mem-card { width:100%; aspect-ratio:3/3.4; border:none; cursor:pointer; border-radius:2.5vmin; font-family:inherit;
  background:linear-gradient(135deg,#b06ef5,#ff6fb7); font-size:6vmin; color:#fff;
  box-shadow:0 4px 0 #9553cc; display:flex; align-items:center; justify-content:center; transition:transform .25s; }
.mem-card .mface { display:none; }
.mem-card.flip { background:#fff; color:#5a2d82; box-shadow:0 4px 0 #e3c7ee; transform:rotateY(0); }
.mem-card.flip .mback { display:none; } .mem-card.flip .mface { display:block; }
.mem-card.matched { background:linear-gradient(135deg,#d7ffd9,#aef3c1); box-shadow:0 4px 0 #7fd898; pointer-events:none; animation:pulseWin .5s; }
/* speed */
.speed-track { height:8vmin; background:rgba(255,255,255,.6); border-radius:99px; position:relative; overflow:hidden; }
.speed-uni { position:absolute; left:0; top:50%; transform:translateY(-50%); font-size:6vmin; transition:left .4s; }
.speed-goal { position:absolute; right:1.5vmin; top:50%; transform:translateY(-50%); font-size:5vmin; }
.mini-instr { text-align:center; font-size:3.2vmin; color:#8b3fa8; background:rgba(255,255,255,.7); border-radius:2vmin; padding:1vmin 2vmin; }

/* ---------- PARENT ---------- */
#scr-parent { gap:1.6vmin; overflow:hidden; }
.p-body { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:1.8vmin; padding-bottom:3vmin; }
.p-sec { background:rgba(255,255,255,.9); border-radius:2.5vmin; padding:2vmin 2.6vmin; box-shadow:0 3px 10px rgba(160,48,143,.12); }
.p-sec h3 { font-size:3.4vmin; color:#8b3fa8; margin-bottom:1.4vmin; }
.p-row { display:flex; align-items:center; gap:1.6vmin; flex-wrap:wrap; margin:.9vmin 0; font-size:3vmin; color:#6d5580; }
.p-row select, .p-row input[type=number] { font-family:inherit; font-size:3vmin; padding:.8vmin 1.4vmin; border-radius:1.5vmin; border:2px solid #e0c3ea; color:#5a2d82; background:#fff; }
.unit-bars { display:grid; grid-template-columns:repeat(auto-fill,minmax(30vmin,1fr)); gap:1vmin 2vmin; }
.ub { font-size:2.6vmin; color:#7a5b90; }
.ub .track { height:2vmin; background:#f2e3f6; border-radius:99px; overflow:hidden; margin-top:.4vmin;}
.ub .fillb { height:100%; background:linear-gradient(90deg,#8be09c,#4fc7a0); border-radius:99px; }
.wrong-list { display:flex; flex-wrap:wrap; gap:1vmin; }
.wl-chip { background:#fdeef5; border-radius:99px; padding:.8vmin 2vmin; font-size:2.7vmin; color:#b0447e; }
.danger-btn { border:none; cursor:pointer; font-family:inherit; background:#ffe0e0; color:#c04545; border-radius:99px; padding:1.2vmin 3vmin; font-size:2.9vmin; }
.ok-btn { border:none; cursor:pointer; font-family:inherit; background:#e3f5e8; color:#2e9159; border-radius:99px; padding:1.2vmin 3vmin; font-size:2.9vmin; }

#gate, #modal, #stkModal, #help { position:fixed; inset:0; background:rgba(90,45,130,.45); z-index:20; display:none; align-items:center; justify-content:center; }
#gate.show, #modal.show, #stkModal.show, #help.show { display:flex; }
.hp-emoji { font-size:16vmin; animation:bob 2.4s ease-in-out infinite; }
.hp-title { font-size:4.6vmin; color:#a0308f; margin-top:1vmin; }
.hp-desc { font-size:3.1vmin; color:#7a5b90; margin-top:1.4vmin; line-height:1.6; white-space:pre-line; }
.hp-dots { display:flex; gap:1.2vmin; justify-content:center; margin-top:2vmin; }
.hdot { width:2vmin; height:2vmin; border-radius:50%; background:#ecd4f2; }
.hdot.on { background:#ff8ad2; }
.gate-box { background:#fff; border-radius:4vmin; padding:4vmin 5vmin; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.3); max-width:84vmin; }
.gate-q { font-size:4.5vmin; color:#5a2d82; margin-bottom:2vmin; }
.gate-in { font-size:5vmin; width:30vmin; text-align:center; border:3px solid #d9b8e8; border-radius:2vmin; padding:1vmin; font-family:inherit; }
.gate-note { font-size:2.6vmin; color:#b092c5; margin-top:1.4vmin; }
.modal-msg { font-size:4vmin; color:#5a2d82; margin-bottom:2.5vmin; white-space:pre-line; }
.stk-reveal { font-size:18vmin; animation:stkIn .8s cubic-bezier(.3,-0.4,.3,1.6); }
@keyframes stkIn { 0%{transform:scale(0) rotate(-360deg)} 100%{transform:scale(1) rotate(0)} }
.sync-dot { position:fixed; bottom:1.2vmin; right:1.6vmin; font-size:2.2vmin; color:#a97fc4; z-index:9; background:rgba(255,255,255,.6); border-radius:99px; padding:.4vmin 1.6vmin; }
#fx { position:fixed; inset:0; z-index:15; pointer-events:none; }
</style>
</head>
<body>
<div id="bgDeco"></div>

<div id="app">

<section id="scr-home" class="screen active">
  <div class="home-top">
    <button class="chip" onclick="location.href='../index.html'">🏰 배움나라</button>
    <div class="chip" id="profile-chip">👧</div>
    <div style="flex:1"></div>
    <div class="stat-pill">⭐ <span id="h-stars">0</span></div>
    <div class="stat-pill">🔥 <span id="h-streak">0</span>일</div>
    <button class="chip" onclick="openHelp()">❓</button>
    <button class="chip" onclick="openGate()">⚙️</button>
  </div>
  <div class="home-title">👑 <span id="home-title-name">단어 왕국</span> 👑</div>
  <div class="home-hero">
    <div class="home-uni" id="home-uni" onclick="uniTap()">🦄</div>
    <div class="hero-right">
      <button class="big-btn" id="btn-adv" onclick="startSession()">모험 시작! ✨</button>
      <div class="streak-dots" id="h-dots"></div>
      <div class="stat-pill" id="h-goal" style="font-size:2.7vmin;">오늘의 모험을 시작해 보자!</div>
    </div>
  </div>
  <div class="mini-row">
    <button class="mini-card" id="mc-bal" onclick="goMini('bal')"><div class="mi">🎈</div><div class="mt">풍선 팡팡</div><div class="ms" id="best-bal">잘 듣고 팡!</div></button>
    <button class="mini-card" id="mc-mem" onclick="goMini('mem')"><div class="mi">🃏</div><div class="mt">짝 맞추기</div><div class="ms" id="best-mem">카드 뒤집기</div></button>
    <button class="mini-card" id="mc-spd" onclick="goMini('spd')"><div class="mi">⚡</div><div class="mt">스피드 퀴즈</div><div class="ms" id="best-spd">60초 도전!</div></button>
    <button class="mini-card" id="mc-test" onclick="startTest()"><div class="mi">🎯</div><div class="mt">깜짝 시험</div><div class="ms">실력 확인!</div></button>
  </div>
  <div class="quest-panel">
    <h4>🌟 오늘의 퀘스트</h4>
    <div id="quest-list"></div>
  </div>
  <div class="mini-row">
    <button class="sub-btn" onclick="showScreen('scr-collection'); renderCollection()">🏰 나의 왕국</button>
    <button class="sub-btn" onclick="showScreen('scr-stickers'); renderStickers()">📔 스티커북 <span id="stk-count"></span></button>
  </div>
</section>

<section id="scr-game" class="screen">
  <div class="game-top">
    <button class="gt-quit" onclick="confirmQuit()">✕</button>
    <div class="progress-wrap"><div class="progress-bar" id="g-prog"></div></div>
    <div class="gt-stars hidden" id="g-timer">⏱ --:--</div>
    <div class="gt-stars">⭐ <span id="g-stars">0</span></div>
  </div>
  <div id="combo-tag">🌈 콤보!</div>
  <div id="g-area" style="flex:1; display:flex; flex-direction:column; gap:2vmin;"></div>
</section>

<section id="scr-mini" class="screen">
  <div class="game-top">
    <button class="gt-quit" onclick="quitMini()">✕</button>
    <div class="mini-instr" id="mini-instr" style="flex:1;"></div>
    <div class="gt-stars hidden" id="m-timer">⏱</div>
    <div class="gt-stars">⭐ <span id="m-stars">0</span></div>
  </div>
  <div id="mini-area"></div>
</section>

<section id="scr-result" class="screen">
  <div class="res-uni" id="res-uni">🦄</div>
  <div class="res-title" id="res-title">오늘도 최고야!</div>
  <div class="res-stats">
    <div class="res-box"><div class="res-num" id="r-stars">+0</div><div class="res-lab">모은 별</div></div>
    <div class="res-box"><div class="res-num" id="r-correct">0</div><div class="res-lab">맞힌 문제</div></div>
    <div class="res-box"><div class="res-num" id="r-words">0</div><div class="res-lab" id="r-words-lab">배운 단어</div></div>
  </div>
  <div class="res-unlock hidden" id="r-unlock"></div>
  <button class="big-btn" onclick="showScreen('scr-home'); renderHome()">좋아! 💖</button>
  <button class="sub-btn" id="r-again" onclick="startSession()">한 번 더 하기 🎀</button>
</section>

<section id="scr-collection" class="screen">
  <div class="col-head">
    <button class="gt-quit" onclick="showScreen('scr-home'); renderHome()">←</button>
    <div class="col-title" id="col-title">🏰 나의 왕국</div>
    <div style="width:6vmin"></div>
  </div>
  <div id="castle-view">
    <div class="kg-sky" id="kg-sky"></div>
    <div class="kg-castle" id="kg-castle">⛺</div>
    <div class="kg-castle-name" id="kg-castle-name"></div>
    <div class="castle-progress" id="castle-progress"></div>
    <div class="kg-garden-title">🌷 단어 정원 — 유닛을 배우면 새싹이 자라요!</div>
    <div class="kg-garden" id="kg-garden"></div>
  </div>
  <div class="uni-grid" id="uni-grid"></div>
</section>

<section id="scr-stickers" class="screen">
  <div class="col-head">
    <button class="gt-quit" onclick="showScreen('scr-home'); renderHome()">←</button>
    <div class="col-title">📔 반짝반짝 스티커북</div>
    <div style="width:6vmin"></div>
  </div>
  <div class="stk-grid" id="stk-grid"></div>
</section>

<section id="scr-parent" class="screen">
  <div class="col-head">
    <button class="gt-quit" onclick="showScreen('scr-home'); renderHome()">←</button>
    <div class="col-title">⚙️ 부모님 설정</div>
    <div style="width:6vmin"></div>
  </div>
  <div class="p-body" id="p-body"></div>
</section>

</div>

<div id="gate"><div class="gate-box">
  <div class="gate-q" id="gate-q">? + ? = ?</div>
  <input class="gate-in" id="gate-in" type="number" inputmode="numeric">
  <div style="margin-top:2vmin; display:flex; gap:2vmin; justify-content:center;">
    <button class="sub-btn" onclick="closeGate()">취소</button>
    <button class="big-btn" style="font-size:3.4vmin; padding:1.4vmin 5vmin;" onclick="checkGate()">확인</button>
  </div>
  <div class="gate-note">부모님만 풀 수 있어요 😊</div>
</div></div>

<div id="modal"><div class="gate-box">
  <div class="modal-msg" id="modal-msg"></div>
  <div style="display:flex; gap:2vmin; justify-content:center;">
    <button class="sub-btn" id="modal-no">아니요</button>
    <button class="big-btn" style="font-size:3.4vmin; padding:1.4vmin 5vmin;" id="modal-yes">네</button>
  </div>
</div></div>

<div id="help"><div class="gate-box" style="max-width:90vmin; width:80vmin;">
  <div class="hp-emoji" id="hp-emoji">🗺️</div>
  <div class="hp-title" id="hp-title"></div>
  <div class="hp-desc" id="hp-desc"></div>
  <div class="hp-dots" id="hp-dots"></div>
  <div style="margin-top:2.5vmin; display:flex; gap:2vmin; justify-content:center;">
    <button class="sub-btn" id="hp-prev" onclick="helpPrev()">← 이전</button>
    <button class="big-btn" style="font-size:3.4vmin; padding:1.4vmin 5vmin;" id="hp-next" onclick="helpNext()">다음 →</button>
  </div>
  <button class="sub-btn" style="margin-top:1.6vmin;" onclick="closeHelp()">건너뛰기</button>
</div></div>

<div id="stkModal"><div class="gate-box">
  <div class="modal-msg">🎁 새 스티커를 얻었어!</div>
  <div class="stk-reveal" id="stk-reveal">✨</div>
  <div class="modal-msg" id="stk-name" style="font-size:3.4vmin; margin-top:1.5vmin;"></div>
  <button class="big-btn" style="font-size:3.4vmin; padding:1.4vmin 5vmin;" onclick="closeStk()">와아! 🎉</button>
</div></div>

<div class="sync-dot hidden" id="sync-dot">☁️ 저장됨</div>
<canvas id="fx"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/cloud.js"></script>
<script src="../data/words.js"></script>
<script src="game.js"></script>
</body>
</html>
